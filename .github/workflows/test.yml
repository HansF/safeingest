name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2  # no bare v8 major tag exists
        with:
          enable-cache: true

      # The fast tests mock the opf model, so torch/CUDA (multi-GB wheels)
      # stay out of CI. Base markitdown covers the html/md fixtures; the
      # heavy format extras (pdf, docx, ...) aren't exercised here either.
      - name: Install package (no heavy deps) + test deps
        run: |
          uv venv --python 3.12
          uv pip install --no-deps -e .
          uv pip install pytest pii-core faker markitdown

      - name: Run test suite (fast, torch/opf-independent tests only)
        run: uv run --no-sync pytest -m "not slow" -v
